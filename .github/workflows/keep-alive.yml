name: Keep Streamlit demo awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping live demo
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 30 https://field-service-maintenance.streamlit.app || true
